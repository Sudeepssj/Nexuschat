<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}NexusChat{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  :root {
    --bg-0: #0a0a0f;
    --bg-1: #0f0f18;
    --bg-2: #141420;
    --bg-3: #1a1a2e;
    --bg-4: #1e1e35;
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.12);
    --accent: #6C63FF;
    --accent-2: #43D9AD;
    --accent-3: #FF6584;
    --text-1: #f0f0ff;
    --text-2: #9999cc;
    --text-3: #55556e;
    --online: #43D9AD;
    --offline: #55556e;
    --msg-own: #1a1535;
    --msg-other: #141420;
    --radius: 14px;
    --radius-sm: 8px;
    --font-display: 'Syne', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg-0);
    color: var(--text-1);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.6;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg-4); border-radius: 2px; }

  .app-shell {
    display: grid;
    grid-template-columns: 72px 280px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  .nav-rail {
    background: var(--bg-1);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 0;
    gap: 6px;
    z-index: 10;
  }
  .nav-logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-weight: 700; font-size: 18px;
    color: white;
    margin-bottom: 16px;
    text-decoration: none;
    flex-shrink: 0;
  }
  .nav-rail-item {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-3);
    text-decoration: none;
    transition: all 0.15s;
    position: relative;
    border: 1px solid transparent;
    cursor: pointer;
  }
  .nav-rail-item:hover, .nav-rail-item.active {
    background: var(--bg-3);
    color: var(--text-1);
    border-color: var(--border);
  }
  .nav-rail-item svg { width: 20px; height: 20px; }
  .nav-badge {
    position: absolute; top: 6px; right: 6px;
    min-width: 16px; height: 16px;
    background: var(--accent-3);
    border-radius: 8px;
    font-size: 9px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    color: white; padding: 0 4px;
  }
  .nav-spacer { flex: 1; }
  .nav-avatar {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-weight: 600; font-size: 12px;
    color: white;
    cursor: pointer;
    border: 2px solid var(--border);
    transition: border-color 0.15s;
    text-decoration: none;
  }
  .nav-avatar:hover { border-color: var(--accent); }


  .sidebar {
    background: var(--bg-1);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-title {
    font-family: var(--font-display);
    font-size: 18px; font-weight: 700;
    color: var(--text-1);
    margin-bottom: 12px;
  }
  .search-box { position: relative; }
  .search-box input {
    width: 100%;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 12px 8px 34px;
    color: var(--text-1);
    font-family: var(--font-body);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--text-3); }
  .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--text-3);
  }
  .search-results {
    position: absolute;
    top: calc(100% + 8px); left: 0; right: 0;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    z-index: 100;
    display: none;
    overflow: hidden;
  }
  .search-result-item {
    padding: 10px 14px;
    cursor: pointer;
    transition: background 0.1s;
    font-size: 13px;
    color: var(--text-2);
    text-decoration: none;
    display: block;
  }
  .search-result-item:hover { background: var(--bg-4); color: var(--text-1); }

  .sidebar-section {
    padding: 12px 16px 6px;
    font-size: 10px; font-weight: 600; letter-spacing: 1.2px;
    color: var(--text-3);
    text-transform: uppercase;
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-section a { color: var(--text-3); text-decoration: none; transition: color 0.15s; }
  .sidebar-section a:hover { color: var(--accent); }

  .sidebar-list { overflow-y: auto; flex: 1; }

  .room-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 16px;
    cursor: pointer; text-decoration: none;
    border-left: 2px solid transparent;
    transition: all 0.15s;
    position: relative;
  }
  .room-item:hover { background: var(--bg-2); }
  .room-item.active { background: var(--bg-3); border-left-color: var(--accent); }
  .room-avatar {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-weight: 600; font-size: 13px;
    color: white; flex-shrink: 0;
  }
  .room-info { flex: 1; min-width: 0; }
  .room-name {
    font-size: 13px; font-weight: 500; color: var(--text-1);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .room-preview {
    font-size: 11px; color: var(--text-3);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .room-meta { font-size: 10px; color: var(--text-3); text-align: right; }

  .user-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 16px;
    cursor: pointer; text-decoration: none;
    transition: background 0.15s;
    position: relative;
  }
  .user-item:hover { background: var(--bg-2); }
  .user-dot {
    width: 8px; height: 8px; border-radius: 50%;
    position: absolute; bottom: 8px; left: 38px;
    border: 2px solid var(--bg-1);
  }
  .user-dot.online { background: var(--online); }
  .user-dot.offline { background: var(--offline); }
  .user-name { font-size: 13px; color: var(--text-2); }

  .main-area {
    display: flex; flex-direction: column;
    background: var(--bg-0);
    overflow: hidden;
  }

  .welcome-screen {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; padding: 40px;
    text-align: center;
  }
  .welcome-logo {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 28px; font-weight: 700;
    color: white; margin-bottom: 8px;
  }
  .welcome-title {
    font-family: var(--font-display); font-size: 32px; font-weight: 700;
    background: linear-gradient(135deg, var(--text-1), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .welcome-sub { color: var(--text-2); font-size: 15px; max-width: 360px; }

  .form-input {
    width: 100%; background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px; color: var(--text-1);
    font-family: var(--font-body); font-size: 14px;
    outline: none; transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text-3); }

  .btn-primary {
    background: var(--accent); color: white;
    border: none; border-radius: var(--radius-sm);
    padding: 10px 20px; font-family: var(--font-display);
    font-weight: 600; font-size: 14px;
    cursor: pointer; transition: opacity 0.15s;
    text-decoration: none; display: inline-flex;
    align-items: center; justify-content: center; gap: 6px;
  }
  .btn-primary:hover { opacity: 0.85; color: white; }
  .btn-ghost {
    background: transparent; color: var(--text-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 16px; font-family: var(--font-body);
    font-size: 13px; cursor: pointer; transition: all 0.15s;
    text-decoration: none; display: inline-flex;
    align-items: center; gap: 6px;
  }
  .btn-ghost:hover { border-color: var(--border-hover); color: var(--text-1); }

  .toast-container {
    position: fixed; bottom: 20px; right: 20px;
    z-index: 9999; display: flex; flex-direction: column; gap: 8px;
  }
  .toast {
    background: var(--bg-3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 16px;
    min-width: 220px; animation: slideIn 0.2s ease;
    font-size: 13px; color: var(--text-2);
  }
  @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: none; opacity: 1; } }
</style>
{% block extra_css %}{% endblock %}
</head>
<body>
<div class="toast-container" id="toastContainer"></div>
{% block body %}{% endblock %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script>
function showToast(msg, type='info') {
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.borderLeftColor = type === 'success' ? 'var(--accent-2)' : type === 'error' ? 'var(--accent-3)' : 'var(--accent)';
  t.style.borderLeftWidth = '3px';
  t.textContent = msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
if (searchInput) {
  let st;
  searchInput.addEventListener('input', function() {
    clearTimeout(st);
    if (!this.value.trim()) { searchResults.style.display='none'; return; }
    st = setTimeout(() => {
      $.get('/search/', {q: this.value}, function(data) {
        let html = '';
        data.rooms.forEach(r => html += `<a href="/room/${r.slug}/" class="search-result-item"># ${r.name}</a>`);
        data.users.forEach(u => html += `<a href="/dm/${u.id}/" class="search-result-item">@ ${u.username}</a>`);
        searchResults.innerHTML = html || '<div class="search-result-item" style="color:var(--text-3)">No results</div>';
        searchResults.style.display = 'block';
      });
    }, 250);
  });
  document.addEventListener('click', e => {
    if (!searchInput.contains(e.target)) searchResults.style.display = 'none';
  });
}

function pollNotifications() {
  $.get('/api/notifications/', function(data) {
    const badge = document.getElementById('notif-badge');
    if (badge) {
      badge.textContent = data.count;
      badge.style.display = data.count > 0 ? 'flex' : 'none';
    }
  });
}
setInterval(pollNotifications, 10000);


</script>
{% block extra_js %}{% endblock %}
</body>
</html>
