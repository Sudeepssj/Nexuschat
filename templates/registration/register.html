<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register · NexusChat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0:#0a0a0f; --bg-1:#0f0f18; --bg-2:#141420;
    --border:rgba(255,255,255,0.06); --accent:#6C63FF; --accent-2:#43D9AD;
    --text-1:#f0f0ff; --text-2:#9999cc; --text-3:#55556e;
  }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:var(--bg-0); color:var(--text-1);
    font-family:'Inter',sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
  }
  .bg-orb { position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none; z-index:0; }
  .orb-1 { width:350px; height:350px; background:rgba(108,99,255,0.12); top:-80px; right:-60px; }
  .orb-2 { width:280px; height:280px; background:rgba(67,217,173,0.08); bottom:-60px; left:-60px; }

  .auth-card {
    background:var(--bg-1); border:1px solid var(--border);
    border-radius:20px; padding:40px; width:100%; max-width:420px;
    position:relative; z-index:1;
    box-shadow:0 40px 80px rgba(0,0,0,0.5);
  }
  .brand { display:flex; align-items:center; gap:12px; margin-bottom:28px; }
  .brand-logo {
    width:44px; height:44px; border-radius:14px;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    display:flex; align-items:center; justify-content:center;
    font-family:'Syne',sans-serif; font-weight:800; font-size:20px; color:white;
  }
  .brand-name { font-family:'Syne',sans-serif; font-size:22px; font-weight:700; }
  .auth-title { font-family:'Syne',sans-serif; font-size:24px; font-weight:700; margin-bottom:6px; }
  .auth-sub { color:var(--text-3); font-size:14px; margin-bottom:24px; }

  .form-group { margin-bottom:14px; }
  .form-label { display:block; font-size:12px; font-weight:500; color:var(--text-2); margin-bottom:5px; }
  .form-input {
    width:100%; background:var(--bg-2); border:1px solid var(--border);
    border-radius:10px; padding:10px 14px; color:var(--text-1);
    font-family:'Inter',sans-serif; font-size:14px; outline:none;
    transition:border-color 0.15s;
  }
  .form-input:focus { border-color:var(--accent); }
  .form-input::placeholder { color:var(--text-3); }
  .field-help { font-size:11px; color:var(--text-3); margin-top:4px; }
  .field-error { font-size:11px; color:#FF6584; margin-top:4px; }

  .btn-submit {
    width:100%; background:var(--accent); color:white; border:none;
    border-radius:10px; padding:12px; font-family:'Syne',sans-serif;
    font-weight:600; font-size:15px; cursor:pointer;
    transition:opacity 0.15s; margin-top:8px;
  }
  .btn-submit:hover { opacity:0.85; }
  .auth-footer { text-align:center; margin-top:20px; font-size:13px; color:var(--text-3); }
  .auth-footer a { color:var(--accent); text-decoration:none; }
  .auth-footer a:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="auth-card">
  <div class="brand">
    <div class="brand-logo">N</div>
    <div class="brand-name">NexusChat</div>
  </div>
  <div class="auth-title">Create account</div>
  <div class="auth-sub">Join the conversation</div>

  <form method="post">
    {% csrf_token %}
    {% for field in form %}
    <div class="form-group">
      <label class="form-label">{{ field.label }}</label>
      {{ field }}
      {% if field.help_text %}<div class="field-help">{{ field.help_text }}</div>{% endif %}
      {% for err in field.errors %}<div class="field-error">{{ err }}</div>{% endfor %}
    </div>
    {% endfor %}
    <button type="submit" class="btn-submit">Create Account →</button>
  </form>
  <div class="auth-footer">
    Already have an account? <a href="/login/">Sign in</a>
  </div>
</div>
</body>
</html>
