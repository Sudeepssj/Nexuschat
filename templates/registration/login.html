<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login · NexusChat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0:#0a0a0f; --bg-1:#0f0f18; --bg-2:#141420; --bg-3:#1a1a2e;
    --border:rgba(255,255,255,0.06); --accent:#6C63FF; --accent-2:#43D9AD;
    --text-1:#f0f0ff; --text-2:#9999cc; --text-3:#55556e;
  }
  *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
  body {
    background: var(--bg-0); color: var(--text-1);
    font-family: 'Inter', sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .bg-orb {
    position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0;
  }
  .orb-1 { width:400px; height:400px; background:rgba(108,99,255,0.12); top:-100px; left:-100px; }
  .orb-2 { width:300px; height:300px; background:rgba(67,217,173,0.08); bottom:-80px; right:-80px; }

  .auth-card {
    background: var(--bg-1); border: 1px solid var(--border);
    border-radius: 20px; padding: 40px; width: 100%; max-width: 400px;
    position: relative; z-index: 1;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5);
  }
  .brand {
    display: flex; align-items: center; gap: 12px; margin-bottom: 32px;
  }
  .brand-logo {
    width: 44px; height: 44px; border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: white;
  }
  .brand-name {
    font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: var(--text-1);
  }
  .auth-title {
    font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700;
    color: var(--text-1); margin-bottom: 6px;
  }
  .auth-sub { color: var(--text-3); font-size: 14px; margin-bottom: 28px; }

  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-2); margin-bottom: 6px; letter-spacing: 0.5px; }
  .form-input {
    width: 100%; background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 14px; color: var(--text-1);
    font-family: 'Inter', sans-serif; font-size: 14px; outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text-3); }

  .btn-submit {
    width: 100%; background: var(--accent); color: white; border: none;
    border-radius: 10px; padding: 12px; font-family: 'Syne', sans-serif;
    font-weight: 600; font-size: 15px; cursor: pointer;
    transition: opacity 0.15s; margin-top: 8px;
  }
  .btn-submit:hover { opacity: 0.85; }

  .auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-3); }
  .auth-footer a { color: var(--accent); text-decoration: none; }
  .auth-footer a:hover { text-decoration: underline; }

  .error-list { background: rgba(255,101,132,0.1); border: 1px solid rgba(255,101,132,0.2);
    border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; }
  .error-list li { color: #FF6584; font-size: 13px; list-style: none; }
</style>
</head>
<body>
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="auth-card">
  <div class="brand">
    <div class="brand-logo">N</div>
    <div class="brand-name">NexusChat</div>
  </div>
  <div class="auth-title">Welcome back</div>
  <div class="auth-sub">Sign in to continue your conversations</div>

  {% if form.errors %}
  <ul class="error-list">
    <li>Invalid username or password. Please try again.</li>
  </ul>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-input" placeholder="your_username" autofocus autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-input" placeholder="••••••••" autocomplete="current-password">
    </div>
    <input type="hidden" name="next" value="{{ next }}">
    <button type="submit" class="btn-submit">Sign In →</button>
  </form>
  <div class="auth-footer">
    Don't have an account? <a href="/register/">Create one</a>
  </div>
</div>
</body>
</html>
